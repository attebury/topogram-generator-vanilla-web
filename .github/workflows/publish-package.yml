name: Publish Generator Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: latest
        type: string

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: attebury/topogram
          path: topogram-source
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Set package version
        run: npm version "${{ inputs.version }}" --no-git-tag-version
      - name: Verify
        run: npm run check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPOGRAM_CLI_PACKAGE_SPEC: "file:${{ github.workspace }}/topogram-source/engine"
      - name: Publish
        run: npm publish --tag "${{ inputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

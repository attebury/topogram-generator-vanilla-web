name: Publish Generator Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: latest
        type: string

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@topogram"
      - name: Set package version
        run: |
          CURRENT="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT" != "${{ inputs.version }}" ]]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
          else
            echo "Package version already set to $CURRENT"
          fi
      - name: Verify
        run: |
          TOPOGRAM_CLI_VERSION="$(cat topogram-cli.version)"
          TOPOGRAM_CLI_PACKAGE_SPEC="@topogram/cli@$TOPOGRAM_CLI_VERSION" npm run check
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag "${{ inputs.dist_tag }}"
